{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Maintenance Request</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Save Request
        </button>

        <a href="{% url 'maintenance_request_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
